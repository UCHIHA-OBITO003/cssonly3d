<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: #D2D2D2;
            background-image:
            repeating-linear-gradient(
                to right, transparent 0 100px,
                #25283b22 100px 101px
            ),
            repeating-linear-gradient(
                to bottom, transparent 0 100px,
                #25283b22 100px 101px
            );
        }
        
        body::before{
            position: absolute;
            width: min(1400px, 90vw);
            top: 10%;
            left: 50%;
            height: 90%;
            transform: translateX(-50%);
            content: '';
            background-image: url(images/bg.png);
            background-size: 100%;
            background-repeat: no-repeat;
            background-position: top center;
            pointer-events: none;
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="banner">
        <div class="slider" style="--quantity: 10">
            <div class="item" style="--position: 1"><img src="images/dragon_1.jpeg" alt=""></div>
            <div class="item" style="--position: 2"><img src="images/dragon_2.jpeg" alt=""></div>
            <div class="item" style="--position: 3"><img src="images/dragon_3.jpeg" alt=""></div>
            <div class="item" style="--position: 4"><img src="images/dragon_4.jpeg" alt=""></div>
            <div class="item" style="--position: 5"><img src="images/dragon_5.jpeg" alt=""></div>
            <div class="item" style="--position: 6"><img src="images/dragon_6.jpeg" alt=""></div>
            <div class="item" style="--position: 7"><img src="images/dragon_7.jpeg" alt=""></div>
            <div class="item" style="--position: 8"><img src="images/dragon_8.jpeg" alt=""></div>
            <div class="item" style="--position: 9"><img src="images/dragon_9.jpeg" alt=""></div>
            <div class="item" style="--position: 10"><img src="images/dragon_10.jpeg" alt=""></div>
        </div>
        <div class="content">
            <h1 data-content="Indhu">
                Indhu 
            </h1>
            <div class="author">
                <h2>அவள்...</h2>
                <p><b>செம்பொன் சிலையோ!</b></p>
                <p>
                    நான் நீ நாம்
                    வாழவே உறவே நீ
                    நான் நாம் தோன்றினோம்
                    உயிரே தாப பூவும் நான்தானே
                    பூவின் தாகம் நீதானே
                </p>
            </div>
            <div class="mobile-surprise">
                <input type="checkbox" id="surprise-toggle" class="surprise-toggle">
                <label for="surprise-toggle" class="surprise-btn">Tap for a surprise</label>
                <div class="surprise-card">
                    <div class="face front">
                        <span>For My Love</span>
                    </div>
                    <div class="face back">
                        <h3>You are my favorite miracle</h3>
                        <p>Isn't the moon beautiful?..Indhu</p>
                    </div>
                </div>
            </div>
            <div class="model"></div>
        </div>
    </div>
    
</body>
</html>
